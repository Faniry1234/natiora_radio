server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html/PUBLIC;
    index index.php index.html index.htm;
        # Disable sendfile to avoid premature EOF for streaming responses
        sendfile off;

    # Global headers for CORS
    add_header Access-Control-Allow-Origin "*";

    # /radio.php endpoint removed — play streams directly from client

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 3600s;
        # For any PHP that may stream, prefer disabling FastCGI buffering to avoid
        # nginx trying to determine Content-Length before streaming begins.
        fastcgi_buffering off;
        fastcgi_request_buffering off;
    }

    # serve static files directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
