server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html/PUBLIC;
    index index.php index.html index.htm;

    # Global headers for CORS
    add_header Access-Control-Allow-Origin "*";

    location = /radio.php {
        # Disable buffering for streaming endpoint
        proxy_buffering off;
        proxy_request_buffering off;
        add_header X-Accel-Buffering no;
        # Let php-fpm handle the script (fastcgi) so PHP proxy logic runs
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/PUBLIC/radio.php;
        # Use TCP to talk to php-fpm (works reliably in this container)
        fastcgi_pass 127.0.0.1:9000;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 3600s;
    }

    # serve static files directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
